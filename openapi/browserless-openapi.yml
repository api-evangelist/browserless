    <li>Supports <code>playwright-core</code> versions <code>1.41.2</code>,
    <code>1.42.1</code>, <code>1.43.1</code>, <code>1.44.1</code>,
    <code>1.45.3</code>, <code>1.46.1</code>, <code>1.47.2</code>,
    <code>1.48.2</code>, <code>1.49.1</code>, <code>1.50.1</code>,
    <code>1.51.1</code>, <code>1.52.0</code>, <code>1.53.1</code>, and
    <code>1.54.2</code>.</li>

    <li>Supports <code>puppeteer-core</code> version <code>24.16.1</code>.</li>

    <li>Supports using of Chrome Extensions in cloud-unit products. Please refer
    to documentation on how to use this new feature.</li>

    <li>Sessions API now support interoperability with BrowserQL.</li>

    <li>Introduces a new vendor for Captcha Solving.</li>

    <li>New environment variables:<ul>

    <li><code>EXTENSIONS_DIR</code> The directory to store extensions onto.</li>

    <li><code>LOAD_EXTENSIONS_FROM_CLOUD</code> Whether or not to load
    extensions from a S3 compatible URL.</li>

    <li><code>EXTENSIONS_CLOUD_BUCKET</code> The bucket for extensions to be
    loaded from.</li>

    <li><code>EXTENSIONS_CLOUD_REGION</code> The region to load extensions
    from.</li>

    <li><code>CAPSOLVER_API_KEY</code> An API key to use for when Capsolver is
    used for captcha solving.</li>

    </ul>

    </li>

    </ul>

    <h1>v2.55.0</h1>

    <ul>

    <li>Dependency updates.</li>

    <li>Reverts some breaking stealth changes in favor of stability.</li>

    <li>Adds a &quot;mode&quot; option in BQL&#39;s
    <code>removeAttributes</code> parameter for better HTML parsing.</li>

    </ul>

    <h1>v2.54.0</h1>

    <ul>

    <li>Dependency updates.</li>

    <li>New LiveURL updates that include an optional
    <code>showBrowserInterface</code> for rendering all the tabs.</li>

    <li>Fixes some issues with stealth and headers that Chrome generates.</li>

    </ul>

    <h1>v2.53.1</h1>

    <ul>

    <li>Revert live-URL updates until they&#39;re backwards compatible.</li>

    </ul>

    <h1>v2.53.0</h1>

    <ul>

    <li>Dependency updates.g</li>

    <li>New <code>viewport</code> API for BQL.</li>

    <li>Consolidation of some internal utilities for consistency sake.</li>

    <li>Big improvements to the <code>/stealth</code> routes for CDP
    libraries.</li>

    <li>You can <code>solveCaptcha</code> without specifying the vendor in
    BQL.</li>

    <li>Support for proxying through residential proxy providers.</li>

    <li>Fixes an issue in BQL that can cause a browser to stay open when
    navigating.</li>

    <li><code>LiveURL</code> can now support multi-tabs workflows.</li>

    <li>Testing fixes.</li>

    </ul>

    <h1>v2.52.4</h1>

    <ul>

    <li>Fixes an issue when deleting sessions</li>

    </ul>

    <h1>v2.52.3</h1>

    <ul>

    <li>Updates to proxying for future compatibility</li>

    </ul>

    <h1>v2.52.2</h1>

    <ul>

    <li>Fixes an issue where proxying can cause un-necessary latency</li>

    </ul>

    <h1>v2.52.1</h1>

    <ul>

    <li>Fix BQL navigation not filtering out iframe page events.</li>

    </ul>

    <h1>v2.52.0</h1>

    <ul>

    <li>Dependency updates.</li>

    <li>Fixes navigation (<code>goto</code>, <code>back</code>,
    <code>forward</code>) issues in BQL for goto, forward and backward
    actions.</li>

    <li><code>blockConsentModal</code> is now default to <code>false</code> in
    BQL as it sometimes causes sites to hang indefinitely when loading.</li>

    <li>New <code>amazonWaf</code> for BQL captcha solving.</li>

    <li>New downloading handling forcing all downloads to be in a configurable
    path by setting a <code>DOWNLOAD_DIR</code>.</li>

    <li>Fix <code>page</code>&#39;s created by playwright&#39;s
    <code>context</code> object hanging.</li>

    <li>Fix issues with CDP-based screen-recording.</li>

    <li>Other fixes, improvements, and reliability enhancements.</li>

    <li>Bumps <code>puppeteer-core</code> to <code>24.12.1</code>.</li>

    <li>Bumps <code>playwright-core</code> to <code>1.54.1</code>.</li>

    <li>Drops support for <code>playwright-core</code> at
    <code>1.49</code>.</li>

    <li>Supports:<ul>

    <li>puppeteer-core: <code>24.12.1</code></li>

    <li>playwright-core: <code>1.41.2</code>, <code>1.42.1</code>,
    <code>1.43.1</code>, <code>1.44.1</code>, <code>1.45.3</code>,
    <code>1.46.1</code>, <code>1.47.2</code>, <code>1.48.2</code>,
    <code>1.49.1</code>, <code>1.50.1</code>, <code>1.51.1</code>,
    <code>1.52.0</code>,</li>

    <li>Chromium: <code>139.0.7258.5</code></li>

    <li>Firefox: <code>140.0.2</code></li>

    <li>Webkit: <code>26.0</code></li>

    <li>Chrome: <code>138.0.7204.101</code> (amd64 only)</li>

    <li>Edge: <code>138.0.3351.83</code> (amd64 only)</li>

    </ul>

    </li>

    </ul>
openapi: 3.0.0
paths:
  /chrome/content:
    post:
      definitions: {}
      description: >-
        A JSON-based API. Given a "url" or "html" field, runs and returns HTML
        content after the page has loaded and JavaScript has parsed.
      parameters:
        - in: query
          name: blockAds
          schema:
            description: |-
              Whether or nor to load ad-blocking extensions for the session.
              This currently uses uBlock-Lite and may cause certain sites
              to not load properly.
            type: boolean
        - in: query
          name: launch
          schema:
            anyOf:
              - $ref: '#/definitions/CDPLaunchOptions'
              - type: string
        - in: query
          name: profile
          schema:
            description: >-
              Name of an authenticated profile to hydrate into the browser at
              launch.

              The profile's cookies, localStorage and IndexedDB are injected via
              CDP

              before your code runs. No-op in builds without a profile
              subsystem.
            type: string
        - in: query
          name: timeout
          schema:
            description: |-
              Override the system-level timeout for this request.
              Accepts a value in milliseconds.
            type: number
        - in: query
          name: token
          schema:
            description: The authorization token
            type: string
        - in: query
          name: trackingId
          schema:
            description: Custom session identifier
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                addScriptTag:
                  type: array
                  items:
                    $ref: '#/definitions/FrameAddScriptTagOptions'
                addStyleTag:
                  type: array
                  items:
                    $ref: '#/definitions/FrameAddStyleTagOptions'
                authenticate:
                  anyOf:
                    - $ref: '#/definitions/Credentials'
                    - type: 'null'
                bestAttempt:
                  description: >-
                    When bestAttempt is set to true, browserless attempt to
                    proceed

                    when "awaited" events fail or timeout. This includes things
                    like

                    goto, waitForSelector, and more.
                  type: boolean
                cookies:
                  type: array
                  items:
                    $ref: '#/definitions/CookieParam'
                emulateMediaType:
                  type: string
                gotoOptions:
                  $ref: '#/definitions/GoToOptions'
                html:
                  type: string
                rejectRequestPattern:
                  type: array
                  items:
                    type: string
                rejectResourceTypes:
                  type: array
                  items:
                    enum:
                      - cspviolationreport
                      - document
                      - eventsource
                      - fedcm
                      - fetch
                      - font
                      - image
                      - manifest
                      - media
                      - other
                      - ping
                      - prefetch
                      - preflight
                      - script
                      - signedexchange
                      - stylesheet
                      - texttrack
                      - websocket
                      - xhr
                    type: string
                requestInterceptors:
                  type: array
                  items:
                    description: >-
                      An array of patterns (using `req.url().match(r.pattern)`
                      to match) and their

                      corresponding responses to use in order to fulfill those
                      requests.
                    type: object
                    properties:
                      pattern:
                        description: >-
                          An array of patterns (using
                          `req.url().match(r.pattern)` to match) and their

                          corresponding responses to use in order to fulfill
                          those requests.
                        type: string
                      response:
                        additionalProperties: false
                        type: object
                        properties:
                          headers:
                            description: >-
                              Optional response headers.


                              The record values will be converted to string
                              following:

                              Arrays' values will be mapped to String

                              (Used when you need multiple headers with the same
                              name).

                              Non-arrays will be converted to String.
                            $ref: '#/definitions/Record%3Cstring%2Cunknown%3E'
                          status:
                            type: number
                          contentType:
                            type: string
                          body:
                            description: >-
                              A string representation of the body to return. Can
                              be a base64-encoded

                              string but please omit any leading content-type
                              data (eg "data:image/png;base64,").
                            type: string
                    additionalProperties: false
                    required:
                      - pattern
                      - response
                setExtraHTTPHeaders:
                  type: object
                  additionalProperties:
                    type: string
                setJavaScriptEnabled:
                  description: Whether or not to allow JavaScript to run on the page.
                  type: boolean
                url:
                  type: string
                userAgent:
                  type: object
                  properties:
                    userAgent:
                      type: string
                    userAgentMetadata:
                      description: >-
                        Used to specify User Agent Client Hints to emulate. See
                        https://wicg.github.io/ua-client-hints

                        Missing optional values will be filled in by the target
                        with what it would normally use.
                      $ref: '#/definitions/Protocol.Emulation.UserAgentMetadata'
                    platform:
                      type: string
                  additionalProperties: false
                viewport:
                  anyOf:
                    - $ref: '#/definitions/Viewport'
                    - type: 'null'
                waitForEvent:
                  type: object
                  properties:
                    event:
                      type: string
                    timeout:
                      type: number
                  additionalProperties: false
                  required:
                    - event
                waitForFunction:
                  type: object
                  properties:
                    fn:
                      description: >-
                        The function, or statement, to be evaluated in browser
                        context
                      type: string
                    polling:
                      description: >-
                        An interval at which the pageFunction is executed,
                        defaults to raf.

                        If polling is a number, then it is treated as an
                        interval in milliseconds

                        at which the function would be executed. If polling is a
                        string,

                        then it can be one of the following values: "raf" or
                        "mutation"
                      type:
                        - string
                        - number
                    timeout:
                      description: >-
                        Maximum time to wait for in milliseconds. Defaults to
                        30000 (30 seconds).

                        Pass 0 to disable timeout.
                      type: number
                  additionalProperties: false
                  required:
                    - fn
                waitForSelector:
                  type: object
                  properties:
                    hidden:
                      type: boolean
                    selector:
                      type: string
                    timeout:
                      type: number
                    visible:
                      type: boolean
                  additionalProperties: false
                  required:
                    - selector
                waitForTimeout:
                  type: number
              type: object
      responses:
        '200':
          content:
            text/html:
              schema:
                description: |-
                  An HTML payload of the website or HTML after JavaScript
                  parsing and execution.
                type: string
                $schema: http://json-schema.org/draft-07/schema#
          description: |-
            An HTML payload of the website or HTML after JavaScript
            parsing and execution.
        '400':
          code: 400
          description: The request contains errors or didn't properly encode content.
          message: HTTP/1.1 400 Bad Request
        '401':
          code: 401
          description: The request is missing, or contains bad, authorization credentials.
          message: HTTP/1.1 401 Unauthorized
        '404':
          code: 404
          description: Resource couldn't be found.
          message: HTTP/1.1 404 Not Found
        '408':
          code: 408
          description: The request took has taken too long to process.
          message: HTTP/1.1 408 Request Timeout
        '429':
          code: 429
          description: Too many requests are currently being processed.
          message: HTTP/1.1 429 Too Many Requests
        '500':
          code: 500
          description: An internal error occurred when handling the request.
          message: HTTP/1.1 500 Internal Server Error
        '503':
          code: 503
          description: Service is unavailable.
          message: HTTP/1.1 503 Service Unavailable
      summary: /chrome/content
      tags:
        - Browser REST APIs
  /chrome/download:
    post:
      definitions: {}
      description: >-
        A JSON or JavaScript content-type API for returning files Chrome has
        downloaded during

        the execution of puppeteer code, which is ran inside context of the
        browser.

        Browserless sets up a blank page, a fresh download directory, injects
        your puppeteer code, and then executes it.

        You can load external libraries via the "import" syntax, and import
        ESM-style modules

        that are written for execution inside of the browser. Once your script
        is finished, any

        downloaded files from Chromium are returned back with the appropriate
        content-type header.
      parameters:
        - in: query
          name: blockAds
          schema:
            description: |-
              Whether or nor to load ad-blocking extensions for the session.
              This currently uses uBlock-Lite and may cause certain sites
              to not load properly.
            type: boolean
        - in: query
          name: launch
          schema:
            description: |-
              Launch options, which can be either an object
              of puppeteer.launch options or playwright.launchServer
              options, depending on the API. Must be either JSON
              object, or a base64-encoded JSON object.
            anyOf:
              - $ref: '#/definitions/CDPLaunchOptions'
              - type: string
        - in: query
          name: profile
          schema:
            description: >-
              Name of an authenticated profile to hydrate into the browser at
              launch.

              The profile's cookies, localStorage and IndexedDB are injected via
              CDP

              before your code runs. No-op in builds without a profile
