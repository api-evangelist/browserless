  /smart-scrape:
    post:
      definitions: {}
      description: >-
        Intelligently scrapes a URL using cascading strategies (HTTP fetch,
        proxy, headless browser, etc).
      parameters:
        - in: query
          name: profile
          schema:
            description: >-
              Optional name of an authentication profile to hydrate into the
              browser

              before scraping. The profile's cookies, localStorage, and
              IndexedDB

              entries are loaded into the session before navigation. Forces the

              browser strategy.
            type: string
        - in: query
          name: timeout
          schema:
            description: The timeout for the scrape operation in milliseconds
            type: number
        - in: query
          name: token
          schema:
            description: >-
              The API token for authenticating the request. Can also be provided
              in the `Authorization` header as a Bearer token. If both are
              provided, the `Authorization` header takes precedence. If no token
              is provided, the route will attempt to authenticate the request
              using any legacy authentication methods (e.g. cookie-based
              sessions) before rejecting the request as unauthorized.
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                url:
                  description: The URL to scrape. Must be an http or https URL.
                  type: string
                formats:
                  description: >-
                    Output formats to include in the response. Accepts an array
                    of format

                    strings such as `["markdown", "screenshot"]`. When
                    `screenshot` or `pdf`

                    is included, a browser strategy is forced.

                    Mirrors the Firecrawl "formats" convention.


                    - `markdown`   – page content converted to markdown

                    - `html`       – cleaned HTML (returned by default in
                    `content`, this is a no-op convenience value)

                    - `screenshot` – full-page screenshot as base64-encoded PNG
                    (forces browser strategy)

                    - `pdf`        – PDF of the page as base64-encoded string
                    (forces browser strategy)

                    - `links`      – list of links extracted from the page
                  default:
                    - html
                  type: array
                  items:
                    enum:
                      - html
                      - links
                      - markdown
                      - pdf
                      - screenshot
                    type: string
              type: object
              required:
                - url
      responses:
        '200':
          content:
            application/json:
              schema:
                description: An HTML payload of the scraped page content.
                type: object
                properties:
                  ok:
                    description: Whether the scrape was successful or not.
                    type: boolean
                  statusCode:
                    description: >-
                      The HTTP status code of the response, or null if the
                      scrape failed before an HTTP response was received (e.g.
                      due to a network error or captcha).
                    type: number
                  content:
                    description: >-
                      The content of the scraped page. This will be a string for
                      HTML content, or a parsed JSON object if the content type
                      is JSON. Will be null if the scrape was unsuccessful.
                    anyOf:
                      - $ref: '#/definitions/Record%3Cstring%2Cunknown%3E'
                      - type: string
                  contentType:
                    description: >-
                      The content type of the scraped page, or null if the
                      scrape was unsuccessful or the content type was
                      unavailable. If the scrape was successful and the content
                      type is JSON, the `content` field will contain the parsed
                      JSON object rather than a string.
                    type: string
                  headers:
                    $ref: '#/definitions/Record%3Cstring%2Cstring%3E'
                    description: >-
                      The HTTP response headers returned by the site, or an
                      empty object if unavailable.
                  strategy:
                    description: >-
                      The strategy that ultimately succeeded in scraping the
                      page, or the strategy that was being attempted when the
                      scrape failed.
                    type: string
                  attempted:
                    description: >-
                      The strategies that were attempted during the scrape, in
                      order.
                    type: array
                    items:
                      type: string
                  message:
                    description: >-
                      An error message describing why the scrape failed, or null
                      if the scrape was successful.
                    type: string
                  screenshot:
                    description: >-
                      A base64-encoded full-page PNG screenshot, present when
                      `"screenshot"` is in `formats` and the scrape succeeded.
                    type: string
                  pdf:
                    description: >-
                      A base64-encoded PDF of the page, present when `"pdf"` is
                      in `formats` and the scrape succeeded.
                    type: string
                  markdown:
                    description: >-
                      The page content converted to markdown, present when
                      `"markdown"` is in `formats` and the scrape succeeded.
                    type: string
                  links:
                    description: >-
                      A list of links found on the page, present when `"links"`
                      is in `formats` and the scrape succeeded.
                    type: array
                    items:
                      type: string
                additionalProperties: false
                required:
                  - attempted
                  - content
                  - contentType
                  - headers
                  - links
                  - markdown
                  - message
                  - ok
                  - pdf
                  - screenshot
                  - statusCode
                  - strategy
                definitions:
                  Record<string,unknown>:
                    type: object
                    additionalProperties: false
                  Record<string,string>:
                    type: object
                    additionalProperties: false
                $schema: http://json-schema.org/draft-07/schema#
          description: An HTML payload of the scraped page content.
        '400':
          code: 400
          description: The request contains errors or didn't properly encode content.
          message: HTTP/1.1 400 Bad Request
        '401':
          code: 401
          description: The request is missing, or contains bad, authorization credentials.
          message: HTTP/1.1 401 Unauthorized
        '404':
