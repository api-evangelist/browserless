                  type: object
                  additionalProperties:
                    type: string
                setJavaScriptEnabled:
                  type: boolean
                url:
                  type: string
                userAgent:
                  type: object
                  properties:
                    userAgent:
                      type: string
                    userAgentMetadata:
                      description: >-
