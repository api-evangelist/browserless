        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  diagnostics:
                    $ref: '#/definitions/RefreshResponseDiagnostics'
                    description: >-
                      Per-entry counts of cookies, origins, and IndexedDB items
                      the server

                      dropped or truncated before persisting. All zero on a
                      clean refresh.
                  id:
                    description: Unique profile identifier.
                    type: string
                  name:
                    description: User-supplied profile name. Unique per token.
                    type: string
