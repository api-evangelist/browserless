  /pdf:
    post:
      definitions: {}
      description: >-
        A JSON-based API for getting a PDF binary from either a supplied

        "url" or "html" payload in your request. Many options exist for

        injecting cookies, request interceptors, user-agents and waiting for

        selectors, timers and more.


        **Note:** This endpoint is also available at: `/chromium/pdf` for
        backwards compatibility.
      parameters:
        - in: query
          name: blockAds
          schema:
            description: |-
              Whether or nor to load ad-blocking extensions for the session.
              This currently uses uBlock-Lite and may cause certain sites
              to not load properly.
            type: boolean
        - in: query
          name: externalProxyServer
          schema:
            description: >-
              External proxy server URL for user-provided proxies.

              Format: http(s)://[username:password@]host:port

              When set, routes requests through this proxy instead of built-in
              residential proxies.
            type: string
        - in: query
          name: launch
          schema:
            description: >-
              Launch options for the browser, either as a JSON object or a JSON
              string.

              Includes options like `headless`, `args`, `defaultViewport`, etc.
            anyOf:
              - $ref: '#/definitions/CDPLaunchOptions'
              - type: string
        - in: query
          name: profile
          schema:
            description: >-
              Name of an authenticated profile to hydrate into the browser at
              launch.

              The profile's cookies, localStorage and IndexedDB are injected via
              CDP

              before your code runs. No-op in builds without a profile
              subsystem.
            type: string
        - in: query
          name: proxy
          schema:
            description: >-
              The type of proxy to use, currently just 'residential' is
              supported
            type: string
            const: residential
        - in: query
          name: proxyCity
          schema:
            description: >-
              The city to use for the proxy.


              Available cities:
              https://production-sfo.browserless.io/proxy/cities?token=YOUR_TOKEN

              Documentation:
              https://docs.browserless.io/baas/features/proxies#built-in-residential-proxy
            type: string
        - in: query
          name: proxyCountry
          schema:
            description: >-
              A two-letter country code for the proxy configuration.


              Supported codes: US, GB, FR, DE, etc.

              Full list:
              https://docs.browserless.io/bql-schema/types/enums/country-type
            type: string
        - in: query
          name: proxyLocaleMatch
          schema:
            description: >-
              Sets the browser's language to match the proxy's geographic
              location.

              Recommended when using proxyCountry to ensure websites render
              content,

              currency, and formatting in the local language. Default is English
              (en-US).
            enum:
              - '0'
              - '1'
              - 'false'
              - 'true'
            type: string
        - in: query
          name: proxyPreset
          schema:
            description: >-
              A preset code for website-specific proxy routing.

              Maps to specific proxy vendors internally for optimal access to
              certain websites.

              Format: "px_<identifier>" (e.g., "px_gov01", "px_amazon01")
            type: string
        - in: query
          name: proxyState
          schema:
            description: >-
              The state or province to use for the proxy, whitespace must be
              replaced with underscores
            type: string
        - in: query
          name: proxySticky
          schema:
            description: >-
              Whether or not to use the same IP for all requests, defaults to
              true
            enum:
              - '0'
              - '1'
              - 'false'
              - 'true'
            type: string
        - in: query
          name: timeout
          schema:
            description: |-
              Override the system-level timeout for this request.
              Accepts a value in milliseconds.
            type: number
        - in: query
          name: token
          schema:
            description: The authorization token
            type: string
        - in: query
          name: trackingId
          schema:
            description: Custom session identifier
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                blockConsentModals:
                  description: >-
                    Whether to automatically block cookie consent modals and
                    popups.
                  type: boolean
                options:
                  description: >-
                    PDF generation options based on Puppeteer's PDFOptions
                    interface.

                    Includes properties like `format`, `margin`,
                    `printBackground`, `landscape`, etc.
                  additionalProperties: false
                  type: object
                  properties:
                    scale:
                      description: >-
                        Scales the rendering of the web page. Amount must be
                        between `0.1` and `2`.
                      type: number
                    displayHeaderFooter:
                      description: Whether to show the header and footer.
                      type: boolean
                    headerTemplate:
                      description: >-
                        HTML template for the print header. Should be valid HTML
                        with the following

                        classes used to inject values into them:


                        - `date` formatted print date


                        - `title` document title


                        - `url` document location


                        - `pageNumber` current page number


                        - `totalPages` total pages in the document
                      type: string
                    footerTemplate:
                      description: >-
                        HTML template for the print footer. Has the same
                        constraints and support

                        for special classes as {@link
                        PDFOptions.headerTemplate}.
                      type: string
                    printBackground:
                      description: Set to `true` to print background graphics.
                      type: boolean
                    landscape:
                      description: Whether to print in landscape orientation.
                      type: boolean
                    pageRanges:
                      description: Paper ranges to print, e.g. `1-5, 8, 11-13`.
                      type: string
                    format:
                      $ref: '#/definitions/PaperFormat'
                    width:
                      description: >-
                        Sets the width of paper. You can pass in a number or a
                        string with a unit.
                      type:
                        - string
                        - number
                    height:
                      description: >-
                        Sets the height of paper. You can pass in a number or a
                        string with a unit.
                      type:
                        - string
                        - number
                    preferCSSPageSize:
                      description: >-
                        Give any CSS `@page` size declared in the page priority
                        over what is

                        declared in the `width` or `height` or `format` option.
                      type: boolean
                    margin:
                      $ref: '#/definitions/PDFMargin'
                      description: Set the PDF margins.
                    path:
                      description: The path to save the file to.
                      type: string
                    omitBackground:
                      description: >-
                        Hides default white background and allows generating
                        pdfs with transparency.
                      type: boolean
                    tagged:
                      description: Generate tagged (accessible) PDF.
                      type: boolean
                    outline:
                      description: Generate document outline.
                      type: boolean
                    timeout:
                      description: >-
                        Timeout in milliseconds. Pass `0` to disable timeout.


                        The default value can be changed by using {@link
                        Page.setDefaultTimeout}
                      type: number
                    waitForFonts:
                      description: >-
                        If true, waits for `document.fonts.ready` to resolve.
                        This might require

                        activating the page using {@link Page.bringToFront} if
                        the page is in the

                        background.
                      type: boolean
                    fullPage:
                      type: boolean
                addScriptTag:
                  description: >-
                    An array of script tags to add to the page before performing
                    actions.

                    Each object can contain either a `url`, or a `content`
                    property.
                  type: array
                  items:
                    $ref: '#/definitions/FrameAddScriptTagOptions'
                addStyleTag:
                  description: >-
                    An array of style tags to add to the page before performing
                    actions.

                    Each object can contain either a `url`, or a `content`
                    property.
                  type: array
                  items:
                    $ref: '#/definitions/FrameAddStyleTagOptions'
                authenticate:
                  $ref: '#/definitions/Credentials'
                  description: >-
                    Credentials for HTTP authentication. Contains `username` and
                    `password` properties.
                bestAttempt:
                  description: >-
                    When bestAttempt is set to true, browserless will attempt to
                    proceed

                    when "awaited" events fail or timeout. This includes things
                    like

                    goto, waitForSelector, and more.
                  type: boolean
                cookies:
                  description: >-
                    An array of cookies to set on the page before navigation.

                    Each cookie object should contain at least `name` and
                    `value` properties.
                  type: array
                  items:
                    $ref: '#/definitions/CookieParam'
                emulateMediaType:
                  description: >-
                    Changes the CSS media type of the page. Accepts values like
                    "screen" or "print".
                  type: string
                gotoOptions:
                  $ref: '#/definitions/GoToOptions'
                  description: >-
                    Options to configure the page navigation, such as `timeout`
                    and `waitUntil`.
                html:
                  description: >-
                    HTML content to set as the page content instead of
                    navigating to a URL.
                  type: string
                rejectRequestPattern:
                  description: >-
                    An array of patterns to match against request URLs for
                    automatic rejection.

                    Requests matching these patterns will be aborted.
                  type: array
                  items:
                    type: string
                rejectResourceTypes:
                  description: >-
                    An array of resource types to reject during page load.

                    Common types include "image", "stylesheet", "font",
                    "script", etc.
                  type: array
                  items:
                    enum:
                      - cspviolationreport
                      - document
                      - eventsource
                      - fedcm
                      - fetch
                      - font
                      - image
                      - manifest
                      - media
                      - other
                      - ping
                      - prefetch
                      - preflight
                      - script
                      - signedexchange
                      - stylesheet
                      - texttrack
                      - websocket
                      - xhr
                    type: string
                requestInterceptors:
                  description: >-
                    An array of request interceptors that can modify or mock
                    network requests.

                    Each interceptor has a `pattern` to match URLs and a
                    `response` to return.
                  type: array
                  items:
                    description: >-
                      An array of patterns (using `req.url().match(r.pattern)`
                      to match) and their

                      corresponding responses to use in order to fulfill those
                      requests.
                    type: object
                    properties:
                      pattern:
                        description: >-
                          An array of patterns (using
                          `req.url().match(r.pattern)` to match) and their

                          corresponding responses to use in order to fulfill
                          those requests.
                        type: string
                      response:
                        additionalProperties: false
                        type: object
                        properties:
                          headers:
                            $ref: '#/definitions/Record%3Cstring%2Cunknown%3E'
                            description: >-
                              Optional response headers.


                              The record values will be converted to string
                              following:

                              Arrays' values will be mapped to String

                              (Used when you need multiple headers with the same
                              name).

                              Non-arrays will be converted to String.
                          status:
                            type: number
                          contentType:
                            type: string
                          body:
                            description: >-
                              A string representation of the body to return. Can
                              be a base64-encoded

                              string but please omit any leading content-type
                              data (eg "data:image/png;base64,").
                            type: string
                    additionalProperties: false
                    required:
                      - pattern
                      - response
                setExtraHTTPHeaders:
                  description: >-
                    An object containing additional HTTP headers to send with
                    every request.
                  type: object
                  additionalProperties:
                    type: string
                setJavaScriptEnabled:
                  description: Whether or not to allow JavaScript to run on the page.
                  type: boolean
                url:
                  description: The URL to navigate to before performing actions.
                  type: string
                userAgent:
                  description: The user agent string to use for the page.
                  type: object
                  properties:
                    userAgent:
                      type: string
                    userAgentMetadata:
                      $ref: '#/definitions/Protocol.Emulation.UserAgentMetadata'
                    platform:
                      type: string
                  additionalProperties: false
                viewport:
                  $ref: '#/definitions/Viewport'
                  description: >-
                    The viewport dimensions and settings for the page.

                    Includes properties like `width`, `height`,
                    `deviceScaleFactor`, etc.
                waitForEvent:
                  description: >-
                    Options for waiting for a specific event to be fired on the
                    page.
                  type: object
                  properties:
                    event:
                      type: string
                    timeout:
                      type: number
                  additionalProperties: false
                  required:
                    - event
                waitForFunction:
                  description: Options for waiting for a JavaScript function to execute.
                  type: object
                  properties:
                    fn:
                      description: >-
                        The function, or statement, to be evaluated in browser
                        context
                      type: string
                    polling:
                      description: >-
                        An interval at which the pageFunction is executed,
                        defaults to raf.

                        If polling is a number, then it is treated as an
                        interval in milliseconds

                        at which the function would be executed. If polling is a
                        string,

                        then it can be one of the following values: "raf" or
                        "mutation"
                      type:
                        - string
                        - number
                    timeout:
                      description: >-
                        Maximum time to wait for in milliseconds. Defaults to
                        30000 (30 seconds).

                        Pass 0 to disable timeout.
                      type: number
                  additionalProperties: false
                  required:
                    - fn
                waitForSelector:
                  description: >-
                    Options for waiting for a specific CSS selector to appear on
                    the page.
                  type: object
                  properties:
                    hidden:
                      type: boolean
                    selector:
                      type: string
                    timeout:
                      type: number
                    visible:
                      type: boolean
                  additionalProperties: false
                  required:
                    - selector
                waitForTimeout:
                  description: >-
                    The amount of time in milliseconds to wait before
                    proceeding.
                  type: number
              type: object
      responses:
        '400':
          code: 400
          description: The request contains errors or didn't properly encode content.
          message: HTTP/1.1 400 Bad Request
        '401':
          code: 401
          description: The request is missing, or contains bad, authorization credentials.
          message: HTTP/1.1 401 Unauthorized
        '404':
          code: 404
          description: Resource couldn't be found.
          message: HTTP/1.1 404 Not Found
        '408':
          code: 408
          description: The request took has taken too long to process.
          message: HTTP/1.1 408 Request Timeout
        '429':
          code: 429
          description: Too many requests are currently being processed.
          message: HTTP/1.1 429 Too Many Requests
        '500':
          code: 500
          description: An internal error occurred when handling the request.
          message: HTTP/1.1 500 Internal Server Error
        '503':
          code: 503
          description: Service is unavailable.
          message: HTTP/1.1 503 Service Unavailable
