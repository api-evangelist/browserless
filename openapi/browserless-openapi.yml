    </ul>

    <h1>v2.95.0</h1>

    <ul>

    <li>Dependency updates.</li>

    <li>Fix billing and <code>Browser Session Ended</code> tracking for
    persistent session and reconnect WebSocket connections
    (<code>/session/connect/:id</code> and <code>/reconnect/:id</code>); each
    WebSocket connection is now billed independently, restoring usage accounting
    for persistent-session traffic.</li>

    <li>Add <code>POST /profile/upload</code> and <code>POST
    /profile/refresh</code> endpoints to create a profile from a pre-captured
    auth state or replace an existing profile&#39;s state in place, with
    server-side sanitization of cookies, origins, and IndexedDB plus a
    diagnostics field describing what was filtered or truncated.</li>

    <li>Fix LiveURL OAuth login for authenticated profiles, and default the
    browser type to <code>stealth</code> when creating a profile without
    specifying one.</li>

    </ul>

    <h1>v2.94.1</h1>

    <ul>

    <li>Dependency updates.</li>

    <li>Cap live viewers at 5 per session ID on <code>/live/&lt;id&gt;</code>
    and return <code>429 Too Many Requests</code> once exceeded, freeing slots
    automatically when viewers disconnect.</li>

    <li>Include captcha detection and classification in snapshot captures,
    giving agents better visibility into security challenges encountered during
    automation.</li>

    <li>Add an optional <code>profile</code> parameter to crawl requests for
    authenticated scraping; crawls now end early on critical errors, truncate
    oversized error messages, and return <code>503</code> if the profile service
    is unavailable.</li>

    </ul>

    <h1>v2.94.0</h1>

    <ul>

    <li>Updates to <code>@browserless.io/browserless</code> at
    <code>v2.48.3</code>.</li>

    <li>Dependency updates.</li>

    <li>Fix agent snapshot generation when pages contain malformed or empty HTML
    attributes, so snapshots no longer fail on attribute encoding edge
    cases.</li>

    <li>Add an optional <code>profile</code> parameter to <code>/scrape</code>
    requests for server-side hydration of authenticated browser profiles;
    requests that use a profile now require an API token and return clearer
    validation errors.</li>

    <li>LiveURL sessions now show distinct end-of-session messages for timeouts
