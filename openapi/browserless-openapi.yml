  /session/bql/*:
    post:
      definitions: {}
      description: >-
        > Executes BrowserQL queries against an existing session. The session
        must be a stealth session to support BrowserQL.


        BrowserQL is a GraphQL-based query language for browser automation that
        allows you to interact with web pages using a declarative syntax.

        Queries execute within the context of your existing session, maintaining
        browser state and session data across multiple operations.
      parameters:
        - in: query
          name: blockAds
          schema:
            description: |-
              Whether or nor to load ad-blocking extensions for the session.
              This currently uses uBlock-Lite and may cause certain sites
              to not load properly.
            type: boolean
        - in: query
          name: launch
          schema:
            description: >-
              Launch options for the browser, either as a JSON object or a JSON
              string.

              Includes options like `headless`, `args`, `defaultViewport`, etc.

              Must be either JSON object, or a base64-encoded JSON object.
            anyOf:
              - $ref: '#/definitions/CDPLaunchOptions'
              - type: string
        - in: query
          name: profile
          schema:
            description: >-
              Name of an authenticated profile to hydrate into the browser at
              launch.

              The profile's cookies, localStorage and IndexedDB are injected via
              CDP

              before your code runs. No-op in builds without a profile
              subsystem.
            type: string
        - in: query
          name: replay
          schema:
            type: boolean
        - in: query
          name: timeout
          schema:
            description: |-
              Override the system-level timeout for this request.
              Accepts a value in milliseconds.
            type: number
        - in: query
          name: token
          schema:
            description: The authorization token
            type: string
        - in: query
          name: trackingId
          schema:
            description: Custom session identifier
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                query:
                  description: >-
                    The GraphQL query string to execute against the browser
                    session.


                    Example queries:

                    - Get browser info: `query { version browser }`

                    - Navigate and get content: `mutation { goto(url:
                    "https://example.com") { status } title { title } url { url
                    } }`

                    - Fill form and submit: `mutation { goto(url:
                    "https://example.com") { status } type(selector:
                    "input[name='email']", text: "user@example.com") { time }
                    click(selector: "button[type='submit']") { time } }`

                    - Extract data: `mutation { querySelector(selector: "h1") {
                    innerHTML } querySelectorAll(selector: ".product") {
                    innerHTML className } }`
                  type: string
                variables:
                  description: >-
                    Variables to pass to the GraphQL query. Useful for dynamic
                    values.


                    Example: `{ "url": "https://example.com", "selector": "h1",
                    "text": "Hello World" }`
                  type: object
                  additionalProperties: {}
                operationName:
                  description: >-
                    The name of the operation to execute if the query contains
                    multiple operations.

                    Optional - only needed when query has multiple named
                    operations.
                  type: string
              type: object
              required:
                - query
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/definitions/Record%3Cstring%2Cany%3E'
                    description: >-
                      The GraphQL response data. Contains the result of the
                      executed query.

                      Structure depends on the specific query executed.


                      Example responses:

                      - Navigation + Title + Element: `{ "goto": { "status": 200
                      }, "title": { "title": "Example Domain" },
                      "querySelector": { "innerHTML": "Example Domain" } }`

                      - Multiple elements: `{ "querySelectorAll": [{
                      "innerHTML": "Item 1" }, { "innerHTML": "Item 2" }] }`

                      - Screenshot: `{ "screenshot": { "data":
                      "base64encodedimage", "type": "png" } }`

                      - PDF: `{ "pdf": { "data": "base64encodedpdf" } }`

                      - System info: `{ "version": "1.0.0", "browser":
                      "Chrome/120.0.0.0" }`

                      - Form interaction: `{ "type": { "success": true },
                      "click": { "success": true } }`
                  errors:
                    description: >-
                      Array of GraphQL errors, if any occurred during query
                      execution.

                      Only present when errors exist.
                    type: array
                    items:
                      type: object
                      properties:
                        message:
                          description: Error message describing what went wrong
                          type: string
                        locations:
                          description: Locations in the query where the error occurred
                          type: array
                          items:
                            type: object
                            properties:
                              line:
                                type: number
                              column:
                                type: number
                            additionalProperties: false
                            required:
                              - column
                              - line
                        path:
                          description: Path to the field that caused the error
                          type: array
                          items:
                            type:
                              - string
                              - number
                      additionalProperties: false
                      required:
                        - message
                additionalProperties: false
                definitions:
                  Record<string,any>:
                    type: object
                    additionalProperties: false
                $schema: http://json-schema.org/draft-07/schema#
        '400':
          code: 400
          description: The request contains errors or didn't properly encode content.
          message: HTTP/1.1 400 Bad Request
        '401':
          code: 401
          description: The request is missing, or contains bad, authorization credentials.
          message: HTTP/1.1 401 Unauthorized
        '404':
          code: 404
          description: Resource couldn't be found.
          message: HTTP/1.1 404 Not Found
