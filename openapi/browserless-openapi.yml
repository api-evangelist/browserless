      description: >-
        Exports a webpage to a PDF or image format. This API is useful for
        generating reports, screenshots, or PDFs of web pages.
      parameters:
        - in: query
          name: blockAds
          schema:
            description: |-
              Whether or nor to load ad-blocking extensions for the session.
              This currently uses uBlock-Lite and may cause certain sites
              to not load properly.
            type: boolean
        - in: query
          name: externalProxyServer
          schema:
            description: >-
              External proxy server URL for user-provided proxies.

              Format: http(s)://[username:password@]host:port

              When set, routes requests through this proxy instead of built-in
              residential proxies.
            type: string
        - in: query
          name: launch
          schema:
            description: >-
              Launch options for the browser, either as a JSON object or a JSON
              string.

              Includes options like `headless`, `args`, `defaultViewport`, etc.
            anyOf:
              - $ref: '#/definitions/CDPLaunchOptions'
              - type: string
        - in: query
          name: profile
          schema:
            description: >-
              Name of an authenticated profile to hydrate into the browser at
              launch.

              The profile's cookies, localStorage and IndexedDB are injected via
              CDP

              before your code runs. No-op in builds without a profile
              subsystem.
            type: string
        - in: query
          name: proxy
          schema:
            description: >-
              The type of proxy to use, currently just 'residential' is
              supported
            type: string
            const: residential
        - in: query
          name: proxyCity
          schema:
            description: >-
              The city to use for the proxy.


              Available cities:
              https://production-sfo.browserless.io/proxy/cities?token=YOUR_TOKEN

              Documentation:
              https://docs.browserless.io/baas/features/proxies#built-in-residential-proxy
            type: string
        - in: query
          name: proxyCountry
          schema:
            description: >-
              A two-letter country code for the proxy configuration.


              Supported codes: US, GB, FR, DE, etc.

              Full list:
              https://docs.browserless.io/bql-schema/types/enums/country-type
            type: string
        - in: query
          name: proxyLocaleMatch
          schema:
            description: >-
              Sets the browser's language to match the proxy's geographic
              location.

              Recommended when using proxyCountry to ensure websites render
              content,

              currency, and formatting in the local language. Default is English
              (en-US).
            enum:
              - '0'
              - '1'
              - 'false'
              - 'true'
            type: string
        - in: query
          name: proxyPreset
          schema:
            description: >-
              A preset code for website-specific proxy routing.

              Maps to specific proxy vendors internally for optimal access to
              certain websites.

              Format: "px_<identifier>" (e.g., "px_gov01", "px_amazon01")
            type: string
        - in: query
          name: proxyState
          schema:
            description: >-
              The state or province to use for the proxy, whitespace must be
              replaced with underscores
            type: string
        - in: query
          name: proxySticky
          schema:
            description: >-
              Whether or not to use the same IP for all requests, defaults to
              true
            enum:
              - '0'
              - '1'
              - 'false'
              - 'true'
            type: string
        - in: query
          name: timeout
          schema:
            description: |-
              Override the system-level timeout for this request.
              Accepts a value in milliseconds.
            type: number
        - in: query
          name: token
          schema:
            description: The authorization token
            type: string
        - in: query
          name: trackingId
          schema:
            description: Custom session identifier
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                bestAttempt:
                  description: >-
                    When bestAttempt is set to true, browserless will attempt to
                    proceed

                    when "awaited" events fail or timeout. This includes things
                    like

                    goto, waitForSelector, and more.
                  type: boolean
                url:
                  description: The URL of the site you want to archive.
                  type: string
                gotoOptions:
                  $ref: '#/definitions/GoToOptions'
                  description: >-
                    An optional goto parameter object for considering when the
                    page is done loading.
                waitForEvent:
                  description: >-
                    Options for waiting for a specific event to be fired on the
                    page.
                  type: object
                  properties:
                    event:
                      type: string
                    timeout:
                      type: number
                  additionalProperties: false
                  required:
                    - event
                waitForFunction:
                  description: Options for waiting for a JavaScript function to execute.
                  type: object
                  properties:
                    fn:
                      description: >-
                        The function, or statement, to be evaluated in browser
                        context
                      type: string
                    polling:
                      description: >-
                        An interval at which the pageFunction is executed,
                        defaults to raf.

                        If polling is a number, then it is treated as an
                        interval in milliseconds

                        at which the function would be executed. If polling is a
                        string,

                        then it can be one of the following values: "raf" or
                        "mutation"
                      type:
                        - string
                        - number
                    timeout:
                      description: >-
                        Maximum time to wait for in milliseconds. Defaults to
                        30000 (30 seconds).

                        Pass 0 to disable timeout.
                      type: number
                  additionalProperties: false
                  required:
                    - fn
                waitForSelector:
                  description: >-
                    Options for waiting for a specific CSS selector to appear on
                    the page.
                  type: object
                  properties:
                    hidden:
                      type: boolean
                    selector:
                      type: string
                    timeout:
                      type: number
                    visible:
                      type: boolean
                  additionalProperties: false
                  required:
                    - selector
                waitForTimeout:
                  description: >-
                    The amount of time in milliseconds to wait before
                    proceeding.
                  type: number
                headers:
                  description: >-
                    An object containing additional HTTP headers to send with
                    every request.
                  type: object
                  additionalProperties:
                    type: string
                includeResources:
                  description: >-
                    Whether to include all linked resources (images, CSS, JS) in
                    a zip file.

                    When true, the response will be a zip file containing the
                    HTML and all resources.

                    When false or not provided, the response will be the raw
                    content (default behavior).
                  type: boolean
              type: object
              required:
                - url
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  html:
                    description: The HTML content of the page.
                    type: string
                additionalProperties: false
                required:
                  - html
                $schema: http://json-schema.org/draft-07/schema#
        '400':
          code: 400
          description: The request contains errors or didn't properly encode content.
          message: HTTP/1.1 400 Bad Request
        '401':
          code: 401
          description: The request is missing, or contains bad, authorization credentials.
          message: HTTP/1.1 401 Unauthorized
        '404':
          code: 404
          description: Resource couldn't be found.
          message: HTTP/1.1 404 Not Found
        '408':
          code: 408
          description: The request took has taken too long to process.
          message: HTTP/1.1 408 Request Timeout
        '429':
          code: 429
          description: Too many requests are currently being processed.
          message: HTTP/1.1 429 Too Many Requests
        '500':
          code: 500
          description: An internal error occurred when handling the request.
          message: HTTP/1.1 500 Internal Server Error
        '503':
          code: 503
          description: Service is unavailable.
          message: HTTP/1.1 503 Service Unavailable
      summary: /chrome/export
      tags:
        - Browser REST APIs
