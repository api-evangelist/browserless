    get:
      definitions: {}
      description: >-
        WebSocket endpoint for agentic browser interaction. Connect to establish
        a

        persistent browser session, then send JSON-RPC messages to control the
        browser.


        Uses a simple JSON protocol instead of GraphQL:

        Send: { "id": 1, "method": "goto", "params": { "url":
        "https://example.com" } }

        Receive: { "id": 1, "result": { "status": 200, "url":
        "https://example.com" } }


        All BQL mutations are available as methods (goto, click, type,
        screenshot, etc.).

        Additionally supports a "snapshot" method that returns interactive page
        elements

        with CSS selectors, plus tab-management methods (getTabs, switchTab,
        createTab,

        closeTab) for multi-tab workflows.
