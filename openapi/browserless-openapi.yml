  /session:
    post:
      definitions: {}
      description: >-
        Creates a new browser session with the specified parameters. The session
        can be used for persistent browser connections

        with well-defined lifetimes and reconnection semantics. BrowserQL
        support is only available for stealth sessions.
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              properties:
                ttl:
                  description: >-
                    The time-to-live (TTL) for the session in milliseconds. Once
                    reached, will be forcefully terminated

                    and all files and processes will be cleaned up. Must be a
                    non-negative number greater than 0.
                  type: number
                processKeepAlive:
                  description: >-
                    An optional time, in milliseconds, to keep the underlying
                    browser process alive after a connection to the session
                    closes.

                    If a connection happens within the keep-alive window, the
                    browser process will remain running and the session can be
                    reconnected to.

                    If a connection happens after the keep-alive window has
                    expired, a new browser process will be launched for the
                    session, with the prior

                    session data. Defaults to 0 (no keep-alive).
                  type: number
                stealth:
                  description: >-
                    Whether or not to enable advanced stealth mode. Defaults to
                    false.
                  type: boolean
                blockAds:
                  description: Whether or not to enable ad-blocking. Defaults to false.
                  type: boolean
                headless:
                  description: |-
                    Whether the browser should be launched in headless mode.
                    Ignored if `stealth` is true, defaults to "true".
                  type: boolean
                args:
                  description: |-
                    An array of command-line arguments to pass to the browser.
                    Defaults to an empty array.
                  type: array
                  items:
                    type: string
                browser:
                  description: >-
                    The type of browser to use for the session.

                    'stealth' uses the Brave browser with advanced
                    anti-detection. Defaults to 'chromium'.
                  enum:
                    - chrome
                    - chromium
                    - stealth
                  type: string
                url:
                  description: >-
                    The underlying page URL you're attempting to automate. Some
                    pages may

                    required special handling in order to work correctly or
                    unblock.

                    This is not required, but can be useful or required for
                    certain sites.
                  type: string
                proxy:
                  description: >-
                    Proxy Parameters for the session if desired.

                    If not specified, the session will use the default network
                    settings.
                  type: object
                  properties:
                    type:
                      description: >-
                        The type of proxy to use, currently only 'residential'
                        is supported.
                      type: string
                      const: residential
                    sticky:
                      description: >-
                        Whether or not to use the same IP address for all
                        proxied requests. Defaults to true
                      type: boolean
                    country:
                      description: >-
                        The country to proxy through. Defaults to 'us' or United
                        States
                      type: string
                    city:
                      description: The city to proxy through.
                      type: string
                    state:
                      description: The state to proxy through.
                      type: string
                    preset:
                      description: >-
                        Preset code for website-specific proxy configurations
                        (e.g., 'px_gov01' for government sites)
                      type: string
                  additionalProperties: false
                replay:
                  description: >-
                    Whether to enable session recording for replay.

                    When true, the session will be recorded and can be replayed
                    later.
                  type: boolean
                extensions:
                  description: >-
                    An array of extension IDs to load into the browser session.

                    Extensions must be previously uploaded to the browserless
                    extension storage.

                    This allows sessions to start with extensions pre-loaded
                    without specifying

                    them in launch arguments at connection time.
                  type: array
                  items:
                    type: string
                profile:
                  description: >-
                    Optional name of an authentication profile to use as initial
                    browser state.

                    The profile's cookies, localStorage, and IndexedDB entries
                    are injected via

                    CDP before your code runs. sessionStorage is intentionally
                    not restored —

                    it is tab-scoped and stale values break OAuth/CSRF flows.
                    Changes during

                    the session do not affect the source profile.
                  type: string
              type: object
              required:
                - ttl
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    description: The ID of the session
                    type: string
                  connect:
                    description: >-
                      The fully-qualified URL to connect CDP-based libraries to
                      the session
                    type: string
                  ttl:
                    description: The total time of life in milliseconds
                    type: number
                  stop:
                    description: >-
                      The fully qualified URL to stop and remove the session
                      with a DELETE method.
                    type: string
                  browserQL:
                    description: >-
                      The fully-qualified URL to run BrowserQL queries against
                      the session
                    type: string
                  cloudEndpointId:
                    description: >-
                      The encrypted cloud endpoint ID for the session when ran
                      in the browserless cloud.

                      This is a cloud-specific property and is only present when
                      using browserless cloud.
                    type: string
                additionalProperties: false
                required:
                  - browserQL
                  - cloudEndpointId
                  - connect
                  - id
                  - stop
                  - ttl
                $schema: http://json-schema.org/draft-07/schema#
        '400':
          code: 400
          description: The request contains errors or didn't properly encode content.
          message: HTTP/1.1 400 Bad Request
        '401':
          code: 401
          description: The request is missing, or contains bad, authorization credentials.
          message: HTTP/1.1 401 Unauthorized
        '404':
          code: 404
          description: Resource couldn't be found.
          message: HTTP/1.1 404 Not Found
        '408':
          code: 408
          description: The request took has taken too long to process.
          message: HTTP/1.1 408 Request Timeout
        '429':
          code: 429
          description: Too many requests are currently being processed.
          message: HTTP/1.1 429 Too Many Requests
        '500':
          code: 500
          description: An internal error occurred when handling the request.
          message: HTTP/1.1 500 Internal Server Error
        '503':
          code: 503
          description: Service is unavailable.
          message: HTTP/1.1 503 Service Unavailable
      summary: /session
      tags:
        - Management REST APIs
        - Browser REST APIs
