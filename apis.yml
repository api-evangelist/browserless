  features:
  - name: Browsers-as-a-Service (BaaS)
    description: >-
      WebSocket endpoints (production-sfo, production-lon, production-ams)
      that drop into existing Puppeteer (connect) and Playwright
      (connectOverCDP / connect) code with one URL change. Selenium-grid
      compatible endpoints exist alongside.
  - name: BrowserQL (BQL)
    description: >-
      A GraphQL automation language with goto, click, type, evaluate,
      waitForSelector, html, mapSelector, screenshot, pdf, and reconnect
      mutations. Stealth (/stealth/bql) and Chrome (/chrome/bql) routes
      provide hardened fingerprints and built-in CAPTCHA solving.
  - name: REST API Family
    description: >-
      /screenshot, /pdf, /content, /scrape, /function, /performance,
      /download, /export, /search, /smart-scrape, /map, /crawl, and
      /unblock endpoints over chrome, chromium, and edge prefixes for
      one-shot HTTP usage without a browser library.
  - name: Stealth and Bot Detection
    description: >-
      Path-based stealth routes, WebGL fingerprinting, UA spoofing, and
      entropy injection. Supports reCAPTCHA, hCaptcha, DataDome, Lemin,
      MTCaptcha, and slider challenges.
  - name: Residential Proxies
    description: >-
      Built-in residential proxy routing with country / city / sticky
      session controls, plus support for external bring-your-own proxies.
  - name: Session Profiles
    description: >-
      Reusable, encrypted browser profiles (/profile, /profiles) that
      persist cookies, localStorage, and authenticated state across runs,
      including authenticated-profile reuse via query parameters.
  - name: Hybrid Automation / LiveURL
    description: >-
      Browserless.liveURL CDP commands let a script hand control of a
      running session to a human (or a watching agent) over an embedded
      live URL, then reclaim control.
  - name: Session Recording and Replay
    description: >-
      rrweb-based session replay plus WebM screen recording for debugging
      and audit, with replay storage from 1 to 90 days by plan.
  - name: Smart Scrape, Search, Map, Crawl
    description: >-
      AI-tuned data-extraction REST endpoints that pick the cheapest
      strategy (HTTP fetch, proxy, headless, CAPTCHA), perform web
      search, build site maps, and run depth-bounded full-site crawls.
  - name: Official MCP Server
    description: >-
      mcp.browserless.io/mcp exposes browser-agent, smart-scraper, custom
      code, downloads, page-export, Lighthouse, and crawl tools to Claude
      Desktop, Cursor, VS Code, Windsurf, and any MCP client.
  - name: Open Source Core
    description: >-
      The browserless/browserless Docker image (Apache 2.0, 13k+ stars)
      is free for non-commercial use and underpins the cloud service,
      enabling self-hosting and private deployments.
  - name: Enterprise Self-Hosting
    description: >-
      Enterprise tier supports private cloud deployments, licensed
      self-hosting, GPU infrastructure, SSO, dedicated account
      management, and millions of units of monthly capacity.
  useCases:
  - name: AI Agent Browsing
    description: >-
      Give Claude, GPT, or open-source agents a real browser to research,
      fill forms, click flows, solve CAPTCHAs, and return structured
      data.
  - name: Stealth Web Scraping at Scale
    description: >-
      Run fleets of fingerprint-randomized Chromium browsers behind
      residential proxies for production data extraction.
  - name: PDF and Screenshot Generation
    description: >-
      High-fidelity PDF and image rendering from HTML or URL inputs, with
      control over viewport, device emulation, headers, and cookies.
  - name: End-to-End Testing
    description: >-
      Drive Playwright, Puppeteer, and Selenium suites against staging
      and production in managed browsers without maintaining grid
      infrastructure.
  - name: RPA and Hybrid Human-in-the-Loop Workflows
    description: >-
      Combine programmatic automation with embedded LiveURL handoff so a
      human (or supervising agent) can complete steps a script cannot.
  - name: Synthetic Monitoring and Lighthouse Audits
    description: >-
      Schedule performance, accessibility, SEO, and best-practices audits
      across a fleet of pages and capture visual / network artifacts.
  - name: AI-Tuned Site Crawls and Knowledge Building
    description: >-
      Use /crawl, /map, and /search to feed agents with structured site
      context for RAG pipelines and research agents.
