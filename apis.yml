aid: browserless
name: Browserless
description: >-
  Browserless is a cloud browser-automation platform that runs managed
  Chromium, Chrome, Edge, Firefox, and WebKit browsers for Puppeteer,
  Playwright, and Selenium clients, plus a GraphQL-based stealth automation
  layer (BrowserQL) and a family of REST APIs for screenshots, PDFs, content
  scraping, function execution, performance audits, smart scraping, search,
  mapping, and full-site crawling. A built-in MCP server exposes browser
  tooling to Claude, Cursor, VS Code, and other agentic clients. The company
  also maintains a popular open-source Docker image of the same name (13k+
  GitHub stars), residential proxies, CAPTCHA solving, session profiles,
  recordings, and hybrid live-URL workflows. Target customers are AI
  startups, agent developers, web scrapers, RPA teams, QA / monitoring teams,
  and enterprises running production browser automation at scale, with
  free, prototyping, starter, scale, and enterprise plans (including
  self-hosted licensing).
