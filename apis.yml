apis:
- aid: browserless:browser-api
  name: Browserless Cloud API
  description: >-
    The Browserless Cloud API is a multi-surface browser platform combining
    (1) WebSocket BaaS endpoints compatible with Puppeteer, Playwright, and
    Selenium across Chromium, Chrome, Edge, Firefox, and WebKit; (2) a
    GraphQL automation layer called BrowserQL for stealth scraping with
    built-in CAPTCHA solving and residential proxies; and (3) a REST API
    family for screenshots, PDFs, content, scrape, function execution,
    performance audits, smart-scrape, search, map, crawl, unblock, and
    session management. All surfaces share a single API token and a
    regional production-{sfo,lon,ams} host pattern.
  humanURL: https://docs.browserless.io
  baseURL: https://production-sfo.browserless.io
